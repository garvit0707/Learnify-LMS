<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Course Content</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #f8fafc;
        padding: 20px;
        min-height: 100vh;
      }
      .header {
        background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
        border-radius: 16px;
        padding: 24px;
        margin-bottom: 24px;
      }
      .badge {
        display: inline-block;
        background: rgba(255, 255, 255, 0.2);
        color: #fff;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        padding: 4px 10px;
        border-radius: 20px;
        margin-bottom: 12px;
      }
      h1 {
        font-size: 22px;
        font-weight: 700;
        color: #fff;
        line-height: 1.3;
        margin-bottom: 8px;
      }
      .instructor {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 16px;
      }
      .instructor img {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.4);
      }
      .instructor-name {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.85);
        font-weight: 500;
      }
      .section {
        background: #1e293b;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 16px;
        border: 1px solid #334155;
      }
      .section h2 {
        font-size: 14px;
        font-weight: 700;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 12px;
      }
      p {
        font-size: 15px;
        line-height: 1.7;
        color: #cbd5e1;
      }
      .stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 16px;
      }
      .stat-card {
        background: #1e293b;
        border-radius: 12px;
        padding: 16px;
        border: 1px solid #334155;
        text-align: center;
      }
      .stat-value {
        font-size: 24px;
        font-weight: 800;
        color: #6366f1;
      }
      .stat-label {
        font-size: 11px;
        color: #64748b;
        margin-top: 4px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .lesson-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 0;
        border-bottom: 1px solid #334155;
      }
      .lesson-item:last-child {
        border-bottom: none;
      }
      .lesson-num {
        width: 28px;
        height: 28px;
        background: #6366f1;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        color: #fff;
        flex-shrink: 0;
      }
      .lesson-title {
        font-size: 14px;
        color: #e2e8f0;
      }
      .lesson-dur {
        font-size: 11px;
        color: #64748b;
        margin-top: 2px;
      }
      .enrolled-badge {
        display: none;
        background: #10b981;
        color: #fff;
        text-align: center;
        padding: 12px;
        border-radius: 12px;
        font-weight: 700;
        font-size: 14px;
        margin-bottom: 16px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="badge" id="category">Loading...</div>
      <h1 id="title">Course Title</h1>
      <div class="instructor">
        <img id="instructorAvatar" src="" alt="Instructor" />
        <div class="instructor-name" id="instructorName">Instructor</div>
      </div>
    </div>

    <div class="enrolled-badge" id="enrolledBadge">✅ You're enrolled!</div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-value" id="rating">4.8</div>
        <div class="stat-label">⭐ Rating</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="price">$0</div>
        <div class="stat-label">💰 Price</div>
      </div>
    </div>

    <div class="section">
      <h2>About This Course</h2>
      <p id="description">Course description will appear here.</p>
    </div>

    <div class="section">
      <h2>Course Curriculum</h2>
      <div id="lessons"></div>
    </div>

    <script>
      const lessons = [
        { title: "Introduction & Setup", dur: "12 min" },
        { title: "Core Concepts", dur: "28 min" },
        { title: "Hands-on Practice", dur: "45 min" },
        { title: "Advanced Topics", dur: "36 min" },
        { title: "Project Walkthrough", dur: "52 min" },
        { title: "Final Assessment", dur: "20 min" },
      ];

      const lessonsEl = document.getElementById("lessons");
      lessons.forEach((l, i) => {
        lessonsEl.innerHTML += `
          <div class="lesson-item">
            <div class="lesson-num">${i + 1}</div>
            <div>
              <div class="lesson-title">${l.title}</div>
              <div class="lesson-dur">${l.dur}</div>
            </div>
          </div>`;
      });

      // Receive data from native app
      window.receiveNativeData = function (jsonStr) {
        try {
          const data = JSON.parse(jsonStr);
          if (data.title)
            document.getElementById("title").textContent = data.title;
          if (data.description)
            document.getElementById("description").textContent =
              data.description;
          if (data.category)
            document.getElementById("category").textContent = data.category;
          if (data.rating)
            document.getElementById("rating").textContent = parseFloat(
              data.rating,
            ).toFixed(1);
          if (data.price)
            document.getElementById("price").textContent = "$" + data.price;
          if (data.instructorName)
            document.getElementById("instructorName").textContent =
              data.instructorName;
          if (data.instructorAvatar)
            document.getElementById("instructorAvatar").src =
              data.instructorAvatar;
          if (data.isEnrolled) {
            document.getElementById("enrolledBadge").style.display = "block";
          }
        } catch (e) {
          console.error("Failed to parse native data", e);
        }
      };

      // Post message to native
      document.addEventListener("click", function () {
        if (window.ReactNativeWebView) {
          window.ReactNativeWebView.postMessage(
            JSON.stringify({ type: "USER_INTERACTION" }),
          );
        }
      });
    </script>
  </body>
</html>
